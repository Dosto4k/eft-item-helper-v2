services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-eft_item_helper}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-eft_item_helper}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eft-item-helper
  
  backend:
    build: ./backend
    restart: always
    expose:
      - 8000
    env_file:
      - ./backend/.env
    command: bash entrypoint.sh
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - django_static:/app/staticfiles
    networks:
      - eft-item-helper

  frontend:
    build: ./frontend
    restart: always
    expose:
      - 80
    networks:
      - eft-item-helper

  nginx:
    build: ./nginx
    volumes:
      - django_static:/web/staticfiles
    ports:
      - 80:80
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - eft-item-helper

volumes:
  django_static:
  postgres_data:

networks:
  eft-item-helper: